name: isar_community_inspector
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  clickup_fading_scroll:
    git:
      url: https://github.com/clickup/clickup_fading_scroll
  flutter:
    sdk: flutter
  flutter_svg: any
  font_awesome_flutter: any
  go_router: ^16.1.0
  google_fonts: ^6.3.0
  isar_community:
    path: ../isar_community
  vm_service: ^15.0.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  build_runner: any
  flutter_lints: ^6.0.0
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
