name: isar_community_generator
description: Code generator for the Isar Database. Finds classes annotated with @Collection.
version: 3.2.0-dev.1
repository: https://github.com/isar-community/isar
homepage: https://isar-community.dev
publish_to: https://pub.isar-community.dev/

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  analyzer: ^7.7.0
  build: ^3.0.0
  dart_style: ^3.0.1
  dartx: ^1.1.0
  glob: ^2.0.2
  isar_community: 3.2.0-dev.1
  path: ^1.8.1
  source_gen: ^3.0.0
  xxh3: ^1.0.1

dev_dependencies:
  build_test: ^3.3.0
  matcher: ^0.12.12
  test: ^1.21.0
  very_good_analysis: ^9.0.0

dependency_overrides:
  isar_community:
    path: ../isar_community
